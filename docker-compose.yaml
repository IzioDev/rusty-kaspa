services:
  kaspa_db:
    container_name: kaspa_db
    image: postgres:17-alpine
    restart: unless-stopped
    shm_size: 4G
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  kaspa_rest_server:
    container_name: kaspa_rest_server
    image: kaspanet/kaspa-rest-server:latest
    restart: unless-stopped
    depends_on:
      - kaspa_db
    environment:
      # IMPORTANT: see note below about host.docker.internal vs WSL IP
      KASPAD_WRPC_URL: ws://host.docker.internal:17610

      # Use the postgres service name, not 127.0.0.1
      SQL_URI: postgresql+asyncpg://postgres:postgres@kaspa_db:5432/postgres
      USE_SCRIPT_FOR_ADDRESS: "true"
    ports:
      - "127.0.0.1:8000:8000"

  simply_kaspa_socket_server:
    container_name: simply_kaspa_socket_server
    image: supertypo/simply-kaspa-socket-server:unstable
    restart: unless-stopped
    environment:
      # if it reads env; otherwise keep command
      KASPAD_WRPC_URL: ws://host.docker.internal:17610
    command: -x 20 --network devnet -s ws://host.docker.internal:17610
    ports:
      - "127.0.0.1:8001:8000"

  simply_kaspa_indexer:
    container_name: simply_kaspa_indexer
    image: supertypo/simply-kaspa-indexer:latest
    restart: unless-stopped
    depends_on:
      - kaspa_db
    command: >
      -u
      --network devnet
      -s ws://host.docker.internal:17610
      -d postgresql://postgres:postgres@kaspa_db:5432/postgres
      --exclude-fields=tx_out_script_public_key_address
      --prune-db
      --retention=7d
    ports:
      - "127.0.0.1:8500:8500"

  kaspa_explorer:
    container_name: kaspa_explorer
    image: supertypo/kaspa-explorer:latest
    restart: unless-stopped
    depends_on:
      - kaspa_rest_server
      - simply_kaspa_socket_server
    environment:
      # Use service names + INTERNAL ports
      API_URI: http://kaspa_rest_server:8000
      API_WS_URI: ws://simply_kaspa_socket_server:8000
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  db_data:
